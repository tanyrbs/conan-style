title: "Conan Mainline Demo"
description: |
  Single-reference strong-style Conan voice conversion.
  Mainline contract:
    src_wav + ref_wav + optional style_profile/style_strength
  Internal design:
    global_timbre_anchor stabilizes identity,
    M_style is the main expression owner,
    M_timbre is a bounded material enhancer.
article: |
  This is the canonical Conan mainline demo surface.
  The old NATSpeech/PortaSpeech TTS Gradio page is kept separately under
  inference/tts/gradio and is explicitly legacy / non-Conan.
default_style_profile: strong_style
default_style_strength: 1.0
