# Mainline/training base config.
# Not the canonical repo inference entrypoint; use egs/conan_mainline_infer.yaml for runnable checked-in inference.
base_config: egs/egs_bases/tts/fs.yaml
task_cls: tasks.Conan.Conan.ConanTask
binary_data_dir: 'data/binary/libritts_single'
processed_data_dir: 'data/processed/libritts_single'
binarizer_cls: data_gen.conan_binarizer.ConanBinarizer

valid_prefixes: []  # current LibriTTS single metadata does not use legacy VCTK-style speaker prefixes
test_prefixes: []
fallback_valid_items_per_speaker: 2
fallback_test_items_per_speaker: 2
test_ids: []
# training
ds_workers: 4
max_tokens: 36000
max_sentences: 32
max_input_tokens: 1550
num_sanity_val_steps: 0 # steps of validation at the beginning
val_check_interval: 5000
valid_infer_interval: 5000
max_updates: 200000

# audio params
audio_sample_rate: 16000
hop_size: 320
win_size: 1024
fft_size: 1024
min_level_db: -100
ref_level_db: 20
fmax: 7600
fmin: 80
max_frames: 3000
f0_max: 1000
f0_min: 50

# speaker params
num_spk: 120
use_spk_id: false
use_spk_embed: false
use_spk_prompt: false

# f0 pred
use_pitch_embed: true
f0_gen: 'orig' # orig, flow
flow_qsample: 'direct' # sig, direct
f0_sample_clip: true
gaussian_start: True
f0_dilation_cycle_length: 4  # *
f0_max_beta: 0.06
f0_residual_layers: 10
f0_residual_channels: 192
weight_decay: 0
keep_bins: 80
f0_timesteps: 1000
f0_K_step: 100
f0_infer_with_ref: false
dur_loss: mse

# mel pred
decoder_type: 'conv'
decay_steps: 50000
dilation_cycle_length: 4  # *
predictor_layers: 5
flow_loss_type: l1
flow_decoder_type: 'wavenet'
schedule_type: 'linear'
residual_layers: 20
residual_channels: 256
optimizer_adam_beta1: 0.9
optimizer_adam_beta2: 0.98
timesteps: 1000
K_step: 25
max_beta: 0.06

# Dur level
dur_level: ph

# Text encoder type 
encoder_type: rel_fft

# VQ-VAE related
hidden_size: 256
kernel_size: 3
ffn_hidden_size: 1024

# new features
lambda_ph_dur: 1.0
lambda_sent_dur: 0.0
lambda_word_dur: 0.0
predictor_grad: 1.0
predictor_dropout: 0.0
use_ph_postnet: true

binarization_args:
  reset_phone_dict: true
  reset_word_dict: true
  shuffle: false
  trim_eos_bos: false
  trim_sil: false
  with_align: true
  with_f0: true
  with_f0cwt: false
  with_linear: false
  with_spk_embed: false
  with_spk_id: true
  with_txt: true
  with_wav: true
  with_word: true

# vocoder
vocoder: HifiGAN
vocoder_ckpt: checkpoints/hifigan_vc
use_nsf: false
vocoder_left_context_frames: 48

spec_min: [-6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0, -6.0]
spec_max: [0.03640973940491676, 0.039425432682037354, 0.29524752497673035, 0.45784831047058105, 0.48333120346069336, 0.5335848927497864, 0.6071611046791077, 0.5474293828010559, 0.6076506972312927, 0.5390501022338867, 0.5743886232376099, 0.485751211643219, 0.4248744249343872, 0.4843744933605194, 0.43331536650657654, 0.5356124639511108, 0.4875929355621338, 0.48614853620529175, 0.44228559732437134, 0.5027499198913574, 0.6554337739944458, 0.3469322919845581, 0.33981558680534363, 0.37933868169784546, 0.34751009941101074, 0.22094282507896423, 0.252963662147522, 0.18274202942848206, 0.1976650059223175, 0.1770155429840088, 0.18206502497196198, 0.1002601608633995, 0.18640224635601044, 0.27240633964538574, 0.04153885692358017, -0.010289354249835014, -0.012929759919643402, 0.035185474902391434, 0.18124309182167053, -0.14512233436107635, -0.1778590828180313, -0.20491982996463776, -0.30119436979293823, -0.1735714226961136, -0.1039585992693901, -0.177497997879982, -0.28803232312202454, -0.24049188196659088, -0.4682924747467041, -0.5791841745376587, -0.5170156955718994, -0.6380605697631836, -0.7147259712219238, -0.6607836484909058, -0.7288452982902527, -0.6338580250740051, -0.7092624306678772, -0.8101216554641724, -0.7633087038993835, -0.8251329660415649, -0.6936700940132141, -0.5180960297584534, -0.7972619533538818, -0.807314932346344, -0.7151175737380981, -0.7785399556159973, -0.8709449768066406, -0.8360402584075928, -0.8253681659698486, -0.9778416156768799, -1.12929368019104, -1.3274869918823242, -1.3071579933166504, -1.5234452486038208, -1.6191706657409668, -1.708594799041748, -1.8246771097183228, -1.9193823337554932, -2.1361801624298096, -2.3829283714294434]

# Mel loss lambda for GAN training
lambda_mel_adv: 0.05

# Discriminator related
disc_win_num: 3
mel_disc_hidden_size: 128
disc_norm: in
disc_reduction: stack
disc_interval: 1
disc_lr: 0.0001
disc_start_steps: 40000
discriminator_scheduler_params:
  gamma: 0.5
  step_size: 40000
discriminator_optimizer_params:
  eps: 1.0e-06
  weight_decay: 0.0

random_speaker_steps: 100000  # legacy alias for reference_curriculum_end_steps; no longer a hard switch
reference_curriculum_mode: bernoulli_cosine
reference_curriculum_start_steps: 20000
reference_curriculum_end_steps: 100000
reference_curriculum_external_prob_init: 0.0
reference_curriculum_external_prob_final: 1.0
reference_curriculum_self_ref_floor: 0.0
reference_curriculum_sample_mode: batch   # keep batchwise while gloss/guided_loss remains a batch scalar

num_valid_plots: 10      # Maximum number of visualizations per epoch
valid_plot_prob: 0.1     # Probability of triggering visualization per batch

# prosody extractor
lambda_commit: 0.25
vq_start: 20500
vae_dropout: 0.0
nVQ: 128  # aligned to the shipped Conan checkpoint
forcing: 20000   # canonical legacy hard fallback cut; keep explicit so prep/docs/smokes agree on the old boundary
forcing_schedule_mode: bernoulli_cosine   # training-only smoothing; legacy hard fallback remains available via `forcing`
forcing_decay_start_steps: 12000
forcing_decay_end_steps: 60000
forcing_prob_init: 1.0
forcing_prob_final: 0.0
crop: false
predictor_grad: 1.0

style: true
style_profile: strong_style  # canonical mainline training should match the shipped strong-style surface
silent_token: 57
content_embedding_dim: 102
content_vocab_size: 102
content_padding_idx: 101
reference_contract_mode: collapsed_reference  # mainline training contract = single-reference weak internal factorization
decoder_style_condition_mode: mainline_full
style_trace_mode: dual
style_reference_memory_mode: slow
fast_style_strength_scale: 1.10
slow_style_strength_scale: 1.20
style_router_enabled: true
style_router_hidden: 256
style_router_bias_init: -0.15
global_style_trace_blend: 0.0
style_query_global_summary_scale: 0.0
global_timbre_to_pitch: false
style_to_pitch_residual: true
style_to_pitch_residual_include_timbre: false
style_to_pitch_residual_mode: auto
style_to_pitch_residual_scale: 1.0
style_to_pitch_residual_max_semitones: 2.5
style_to_pitch_residual_smooth_factor: 0.35
style_to_pitch_residual_apply_during_teacher_forcing: false
global_style_summary_fallback_to_timbre: false
global_style_anchor_strength: 1.0
use_decoder_style_adapter: true
decoder_style_adapter_gate_hidden: 256
decoder_global_timbre_scale: 0.18
decoder_global_timbre_scale_mid: 0.08
decoder_global_timbre_scale_late: 0.03
decoder_style_global_scale: 0.2
decoder_slow_style_trace_scale: 0.80
decoder_style_trace_scale: 1.10
decoder_dynamic_timbre_scale: 0.16
decoder_dynamic_timbre_scale_mid: 0.14
decoder_dynamic_timbre_scale_late: 0.08
decoder_dynamic_timbre_late_no_style_scale: 0.0
decoder_skip_global_style_when_local_style_present: true  # late stage prefers local style owner over repeated global summary injection
decoder_style_adapter_effective_signal_epsilon: 1.0e-8
decoder_style_adapter_gate_bias: -1.0
decoder_style_adapter_gate_bias_start: -1.0
decoder_style_adapter_gate_bias_end: 0.0
decoder_style_adapter_gate_bias_warmup: 80000

# Strong-style / strong-emotion v1
use_reference_bundle: true
use_reference_cache: true
emit_collapsed_reference_aliases: false
allow_split_reference_inputs: false
prompt_ref_fallback_to_style: false
use_dynamic_timbre: true
enable_emotion_condition: false
enable_accent_condition: false
ref_group_size: 4
reference_prosody_slow_pool: 4
reference_timbre_slow_pool: 2
dynamic_timbre_reference_memory_mode: slow
allow_explicit_dynamic_timbre_strength: false
dynamic_timbre_strength_base: 0.55
dynamic_timbre_strength_slope: 0.45
dynamic_timbre_strength_min: 0.50
dynamic_timbre_strength_max: 1.05
dynamic_timbre_use_tvt: true
dynamic_timbre_num_facets: 8
dynamic_timbre_facet_hidden: 256
dynamic_timbre_tvt_prior_scale: 1.0
dynamic_timbre_tvt_mix_bias: -0.25
dynamic_timbre_tvt_variation_bias: -1.0
dynamic_timbre_material_router_bias: 1.0
dynamic_timbre_style_condition_scale: 0.35
dynamic_timbre_query_style_condition_scale: 0.0
dynamic_timbre_coarse_style_context_scale: 0.0
dynamic_timbre_style_context_stopgrad: true
dynamic_timbre_boundary_suppress_strength: 0.50
dynamic_timbre_boundary_radius: 2
dynamic_timbre_anchor_preserve_strength: 0.20
tv_timbre_gate_bias_init: -1.0
runtime_dynamic_timbre_style_budget_enabled: true
runtime_dynamic_timbre_style_budget_ratio: 0.40
runtime_dynamic_timbre_style_budget_margin: 0.0
runtime_dynamic_timbre_style_budget_slow_style_weight: 1.0
runtime_dynamic_timbre_style_budget_epsilon: 1.0e-6
use_external_speaker_verifier: false
speaker_verifier_backend: ecapa
speaker_verifier_ckpt: null
speaker_verifier_detach_input: false
# (single-reference) style/dynamic_timbre ref sampling disabled
use_fixed_timbre_reference: true
# (single-reference) style/dynamic_timbre ref sampling params removed
use_energy_embed: false
lambda_energy: 0.0

# Optional supervised control heads
control_loss_profile: mainline_minimal
# Canonical mainline_minimal 4-loss pack:
# lambda_output_identity_cosine + lambda_dynamic_timbre_budget
# + lambda_pitch_residual_safe + lambda_decoder_late_owner
# lambda_dynamic_timbre_boundary stays off in canonical mainline.
num_styles: 0
lambda_style_trace_smooth: 0.0
lambda_style_trace_consistency: 0.0
lambda_style_timbre_disentangle: 0.0
lambda_style_query_var: 0.0
lambda_global_style_summary_align: 0.0
lambda_slow_style_summary_align: 0.0
lambda_tv_timbre_smooth: 0.0
lambda_tv_timbre_anchor: 0.0
lambda_timbre_anchor_cosine: 0.0
lambda_output_identity_cosine: 0.03
lambda_style_dynamic_timbre_disentangle: 0.0
lambda_dynamic_timbre_gate: 0.0
lambda_dynamic_timbre_budget: 0.03
lambda_dynamic_timbre_boundary: 0.0
lambda_dynamic_timbre_anchor: 0.0
lambda_pitch_residual_safe: 0.01
lambda_gate_rank: 0.0
lambda_decoder_late_owner: 0.015
lambda_decoder_late_anchor_budget: 0.0
dynamic_timbre_gate_target: 0.35
dynamic_timbre_budget_ratio: 0.40
dynamic_timbre_budget_margin: 0.0
pitch_residual_smooth_weight: 0.10
decoder_late_timbre_owner_ratio: 0.50
decoder_late_anchor_budget_ratio: 0.35
decoder_late_anchor_budget_floor: 0.0
timbre_reg_start_steps: 15000
timbre_reg_warmup_steps: 20000
timbre_reg_init_scale: 0.0
timbre_reg_final_scale: 1.0
control_regularization_schedule:
  type: linear
  lambda_output_identity_cosine: {start: 2000, warmup: 8000, initial: 0.0, target: 0.03}
  lambda_dynamic_timbre_budget: {start: 0, warmup: 6000, initial: 0.0, target: 0.03}
  lambda_pitch_residual_safe: {start: 4000, warmup: 8000, initial: 0.0, target: 0.01}
  lambda_decoder_late_owner: {start: 2000, warmup: 8000, initial: 0.0, target: 0.015}
log_control_diagnostics: true
control_diagnostics_track_lambdas: true
valid_use_streaming_prefix_path: true
streaming_eval_tokens_per_chunk: 4
streaming_parity_tail_frames: 32
streaming_parity_boundary_window: 8

# Emformer-related parameters
emformer_ckpt: checkpoints/Emformer
emformer_layers: 6
chunk_size: 80
right_context: 2
emformer_input_dim: 80
emformer_output_dim: 100
emformer_mode: null
