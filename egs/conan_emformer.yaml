base_config: egs/egs_bases/tts/fs.yaml
task_cls: tasks.Conan.Conan.ConanTask
binary_data_dir: 'data/binary/vc_6layer'
processed_data_dir: 'data/processed/vc'
binarizer_cls: data_gen.conan_binarizer.ConanBinarizer

valid_prefixes: [
  'p231',
  'p334',
  'p360',
  'p362',
]
test_prefixes: [
  'p231',
  'p334',
  'p360',
  'p362',
]
test_ids: []
# training
ds_workers: 4
max_tokens: 36000
max_sentences: 32
max_input_tokens: 1550
num_sanity_val_steps: 0 # steps of validation at the beginning
val_check_interval: 5000
valid_infer_interval: 5000
max_updates: 200000

# audio params
audio_sample_rate: 16000
hop_size: 320
win_size: 1024
fft_size: 1024
min_level_db: -100
ref_level_db: 20
fmax: 7600
fmin: 80
max_frames: 3000
f0_max: 1000
f0_min: 50

# speaker params
num_spk: 120
use_spk_id: false
use_spk_embed: false
use_spk_prompt: false

# f0 pred
use_pitch_embed: true
f0_gen: 'orig' # orig, flow
flow_qsample: 'direct' # sig, direct
f0_sample_clip: true
gaussian_start: True
f0_dilation_cycle_length: 4  # *
f0_max_beta: 0.06
f0_residual_layers: 10
f0_residual_channels: 192
weight_decay: 0
keep_bins: 80
f0_timesteps: 1000
f0_K_step: 100
f0_infer_with_ref: false
dur_loss: mse

# mel pred
decoder_type: 'conv'
decay_steps: 50000
dilation_cycle_length: 4  # *
predictor_layers: 5
flow_loss_type: l1
flow_decoder_type: 'wavenet'
schedule_type: 'linear'
residual_layers: 20
residual_channels: 256
optimizer_adam_beta1: 0.9
optimizer_adam_beta2: 0.98
timesteps: 1000
K_step: 25
max_beta: 0.06

# Dur level
dur_level: ph

# Text encoder type 
encoder_type: rel_fft

# VQ-VAE related
hidden_size: 256
kernel_size: 3
ffn_hidden_size: 1024

# new features
lambda_ph_dur: 1.0
lambda_sent_dur: 0.0
lambda_word_dur: 0.0
predictor_grad: 1.0
predictor_dropout: 0.0
use_ph_postnet: true

binarization_args:
  reset_phone_dict: true
  reset_word_dict: true
  shuffle: false
  trim_eos_bos: false
  trim_sil: false
  with_align: true
  with_f0: true
  with_f0cwt: false
  with_linear: false
  with_spk_embed: false
  with_spk_id: true
  with_txt: true
  with_wav: true
  with_word: true

# vocoder
vocoder: HifiGAN
vocoder_ckpt: checkpoints/hifigan_vc
use_nsf: false
vocoder_stream_context: 4

